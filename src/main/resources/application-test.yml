# This is the application configuration file for the test environment.
# It uses an in-memory H2 database and configures JPA to create and drop the schema for each test run.
spring:
  datasource:
    url: jdbc:h2:mem:eventplatform_test;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

cors:
  allowed-origin: http://localhost:3000

jwt:
  secret: test-jwt-secret-must-be-at-least-32-bytes-long-for-hmac-sha256
  expiration-ms: 3600000

cloudinary:
  cloud-name: ""
  api-key: ""
  api-secret: ""
