spring:
  application:
    name: eventplatform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/eventplatform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8080

cors:
  allowed-origin: http://localhost:4200

jwt:
  secret: ${JWT_SECRET:change-me-this-default-secret-must-be-at-least-32-bytes-long-for-hs256}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
